# cloudtui shell config — example/template.
#
# Copy this file to config.yaml in the same directory to customize the
# logo and color palette. config.yaml is gitignored, so local changes are
# never committed; if it's absent, cloudtui uses its built-in defaults
# (the values shown below).

logo:
  - "╔═══════════╗"
  - "║ CLOUDTUI  ║"
  - "╚═══════════╝"

# Colors accept a tview/tcell color name (e.g. "yellow") or a hex code
# (e.g. "#ffcc00"). Any field left out here falls back to its default.
colors:
  border: green   # fallback resource-view border color (see views: below)
  label: yellow   # field labels, e.g. "Profile:"
  value: white    # field values / default text
  accent: aqua    # key-binding tokens in the shortcuts panel

  # Not yet shown anywhere (no feature renders success/warning/error
  # state today), but defined so a later feature doesn't need another
  # config-schema change.
  success: green
  warning: yellow
  error: red

  # Per-view border/title color. A view left out here falls back to
  # border: above, so adding a new view later doesn't require an update.
  views:
    home: aqua
    secrets: yellow
    params: teal
    queues: fuchsia
    settings: gray

# Normally set via the Settings view's profile picker ('s', then select
# from your ~/.aws profiles), not hand-edited.
aws:
  profile: ""

# mq-proxy connection ("Queue Connection" in Settings — currently a
# read-only display there, hand-edited here). password can also be set
# via the MQPROXY_CLIENT_PASSWORD env var, which always wins over this
# file — handy for scripted/CI use without putting a real password in a
# checked-out file, even a gitignored one.
queue:
  proxyUrl: http://localhost:8081
  username: admin
  password: ""
